
bookdown::gitbook:
  css: style.css
  split_by: chapter
  includes:
    in_header: google-analytics.html
  config:
    toc:
      collapse: section
      before: |
        <li><a href="./">Life and Mind</a></li>

bookdown::pdf_book:
  latex_engine: xelatex
  toc: true
  number_sections: true
  citation_package: natbib
  includes:
    before_body: epigraph.tex

bookdown::epub_book: default

